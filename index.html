<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Schiphol E-learning Kiosk</title>

<style>
body { font-family: Arial; background:#fff; color:#111; text-align:center; margin:0; }

.hero {
position:relative;
min-height:auto;
display:flex;
align-items:center;
justify-content:center;
padding:40px 30px 20px;
box-sizing:border-box;
}

.hero-content {
position:relative;
width:100%;
max-width:1200px;
}

.hero-title {
margin:0 0 24px;
font-size:40px;
position:relative;
top:0;
}

.links {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:24px;
}

a.link {
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
width:160px;
padding:16px 12px;
background:#021a4f;
color:#fff;
text-decoration:none;
font-size:16px;
border-radius:12px;
justify-content:center;
}

a.link:hover { background:#02113a; }

.link-icon {
font-size:34px;
line-height:1;
}

#logo { position:fixed; bottom:10px; right:10px; padding:12px; }

#instructions { font-size:18px; margin-top:12px; color:#021a4f; display:none; }

.support-tel {
display:inline-block;
margin-top:8px;
color:#021a4f;
text-decoration:underline;
}

.support-tel:hover { color:#02113a; }

.support-button {
margin-top:20px;
padding:10px 20px;
font-size:20px;
border:none;
border-radius:6px;
background:#021a4f;
color:#fff;
cursor:pointer;
display:inline-block;
}

.support-button:hover { background:#02113a; }
</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1 class="hero-title">Schiphol E-learning</h1>

<div class="links">
<a class="link" href="https://outlook.office.com" target="_blank">
<span class="link-icon" aria-hidden="true">📧</span>
Outlook
</a>

<a class="link" href="https://learninghub-extern.schiphol.nl/" target="_blank">
<span class="link-icon" aria-hidden="true">🔐</span>
Inloggen via Learning Hub
</a>

<a class="link" href="https://learninghub-extern.schiphol.nl/nl/ui#/catalog/course/48237464-46c6-4bc3-9e6e-5bc8081e2896" target="_blank">
<span class="link-icon" aria-hidden="true">♿</span>
E-learning Passengers with Reduced Mobility (PRM)
</a>

<a class="link" href="https://learninghub-extern.schiphol.nl/nl/ui#/catalog/course/e9409f7d-fda7-4286-bcf3-ddaa7d2968af" target="_blank">
<span class="link-icon" aria-hidden="true">🛡️</span>
E-learning Safety & Security module Algemeen
</a>

<a class="link" href="https://learninghub-extern.schiphol.nl/nl/ui#/catalog/course/ac483b54-c845-4116-b2a5-edc318d17461" target="_blank">
<span class="link-icon" aria-hidden="true">🏢</span>
E-learning Safety & Security module Terminal
</a>
</div>

<button class="support-button" type="button" onclick="showSupport()">Support</button>

<div id="instructions">
Als je er echt echt niet uitkomt neem dan contact op met support.
<div>
<a class="support-tel" href="tel:0203038329">Bel: 020 303 8329</a>
</div>
</div>
</div>
</div>

<img id="logo" src="logo.png" alt="Enticon Logo">

<script>
function showSupport() {
document.getElementById("instructions").style.display = "block";
}
</script>

</body>
</html>
